    function createLightningPath(x1, y1, x2, y2) {
        const dx=x2-x1, dy=y2-y1, dist=Math.sqrt(dx*dx+dy*dy);
        if (dist === 0) return [{x:x1, y:y1}, {x:x2, y:y2}];
        const segs=1+Math.floor(Math.random()*2);
        const pts=[{x:x1,y:y1}];
        const perpX=-dy/dist, perpY=dx/dist;
        for (let i=1;i<=segs;i++) {
            const t=i/(segs+1);
            const offset=(Math.random()-0.5)*dist*0.4;
            pts.push({x:x1+dx*t+perpX*offset, y:y1+dy*t+perpY*offset});
        }
        pts.push({x:x2,y:y2});
        return pts;
    }

    function processDarkChain(firstTarget, baseDmg) {
        const lv=player.skills.darksurge; if (!lv) return;
        const chainCount=[0,1,2,3,3,4][lv];
        const dmgRatios= (lv >= 5) 
            ? [0.9, 0.81, 0.73, 0.65] 
            : [[],[0.7],[0.7,0.5],[0.7,0.5,0.3],[0.9,0.7,0.5],[0.9,0.7,0.5,0.3]][lv] || [0.5];
            
        let cur=firstTarget;
        const hitSet=new Set([firstTarget.id]);
        for (let i=0;i<chainCount;i++) {
            let next=null, minD=Infinity;
            for (const e of enemies) {
                if (e.isDead||hitSet.has(e.id)) continue;
                const dSq=(e.x-cur.x)**2+(e.y-cur.y)**2;
                if (dSq<300*300&&dSq<minD) { minD=dSq; next=e; }
            }
            if (!next) break;
            const dmg = baseDmg * (dmgRatios[i] || 0.5);
            damageEnemy(next, dmg, false, 'chain');
            chainEffects.push({path:createLightningPath(cur.x,cur.y,next.x,next.y),life:0.35,maxLife:0.35});
            playSound('chain');
            hitSet.add(next.id);
            cur=next;
        }
    }

    function executeFire(isBurst = false) {
        let hasEnemyInView = false;
        for (const e of enemies) {
            if (!e.isDead && isInView(e.x, e.y, 200)) { hasEnemyInView = true; break; }
        }
        if (!hasEnemyInView) return;

        const baseAngle = player.aimAngle; 
        const isDark=player.darksurgeDuration>0;
        const sc=getScatterCount();
        const dmgEach=player.baseAtk*(player.atkMultiplier||1)*getBulletDamageMulti();
        
        const spread=0.35; 
        const step=sc>1 ? spread/(sc-1) : 0;
        const startAngle = sc%2===0 ? baseAngle-step*(sc/2-0.5) : baseAngle-spread/2;

        for (let i=0;i<sc;i++) {
            const ang=sc>1?(startAngle+step*i):baseAngle;
            bullets.push({
                x:player.x, y:player.y,
                vx:Math.cos(ang)*player.bulletSpeed, vy:Math.sin(ang)*player.bulletSpeed,
                radius:player.bulletRadius, life:3,
                dmg:dmgEach, hitSet:new Set(), isSplit:false, isDark, type:'normal'
            });
        }
        playSound('shoot');
        coreShootPulse=1.0;
    }

    function fireBasicShoot() {
        let hasEnemyInView = false;
        for (const e of enemies) {
            if (!e.isDead && isInView(e.x, e.y, 200)) { hasEnemyInView = true; break; }
        }
        if (!hasEnemyInView) return;

        executeFire(false);
        let burstLv = player.skills.burstShot || 0;
        if (burstLv > 0) {
            let shots = [0, 1, 2, 3][burstLv];
            for (let i=1; i<=shots; i++) {
                burstQueue.push(0.12 * i);
            }
        }
    }

    function triggerSplit(sx, sy) {
        const lv=player.skills.splitShot; if (!lv) return;
        const count=[0,1,1,2,2,3][lv];
        const dmgPct=[0,0.3,0.4,0.4,0.5,0.7][lv];
        const isDark=player.darksurgeDuration>0;
        const dmg = player.baseAtk*dmgPct*(player.atkMultiplier||1)*getBulletDamageMulti();
        for (let i=0;i<count;i++) {
            const ang=Math.random()*Math.PI*2;
            bullets.push({
                x:sx, y:sy,
                vx:Math.cos(ang)*player.bulletSpeed*0.8, vy:Math.sin(ang)*player.bulletSpeed*0.8,
                radius:3, life:1.5, dmg: dmg,
                hitSet:new Set(), isSplit:true, isDark, type:'split'
            });
        }
    }

    // 敌人布娃娃碎片化爆炸
    function spawnShatterPieces(e) {
        if (e.sides < 3) return;
        const col = e.isBoss ? 'rgba(255,50,50,0.9)' : THEME.main;
        for (let i = 0; i < e.sides; i++) {
            const a1 = e.angle + (i * 2 * Math.PI) / e.sides;
            const a2 = e.angle + ((i+1) * 2 * Math.PI) / e.sides;
            const pAng = (a1 + a2) / 2;
            shatterPieces.push({
                x: e.x, y: e.y,
                vx: Math.cos(pAng) * (100 + Math.random()*200),
                vy: Math.sin(pAng) * (100 + Math.random()*200),
                rot: e.angle, spin: (Math.random()-0.5)*15,
                life: 0.5 + Math.random()*0.4,
                maxLife: 0.9,
                p1x: Math.cos(a1)*e.radius, p1y: Math.sin(a1)*e.radius,
                p2x: Math.cos(a2)*e.radius, p2y: Math.sin(a2)*e.radius,
                color: col
            });
        }
    }

    function damageEnemy(e, baseDmg, forceCrit=false, skillKey='normal', silent=false) {
        if (!e||e.isDead) return;
        const isCrit=forceCrit||(Math.random()<player.critChance);
        const v=0.85+Math.random()*0.3;
        const finalDmg=baseDmg*v*(isCrit?player.critMultiplier:1);
        e.hp-=finalDmg; e.hitTimer=0.12;
        recordDamage(skillKey, finalDmg);
        
        if(e.isBoss) {
            let hpBar = document.getElementById('boss-hp-fill');
            if(hpBar) hpBar.style.width = Math.min(100, (e.hp/e.maxHp)*100) + '%';
        }

        if (!silent) {
            // 泰拉瑞亚飘字，起始位置错落，拥有初速度vx和向上的极速vy
            const offsetX = (Math.random() - 0.5) * 40;
            const offsetY = (Math.random() - 0.5) * 20;
            textParticles.push({
                x: e.x + offsetX, 
                baseX: e.x + offsetX, 
                y: e.y - e.radius - 10 + offsetY,
                text: `-${Math.ceil(finalDmg)}${isCrit?'!':''}`,
                life: 0.9, maxLife: 0.9, 
                vy: -70 - Math.random() * 30, 
                vx: 0, 
                isDmg: true,
                wobbleSpeed: 6 + Math.random() * 6,
                wobbleOffset: Math.random() * Math.PI * 2,
                hueStart: 30 + Math.random() * 20, 
                hueEnd: 0 + Math.random() * 10,    
                size: isCrit ? 20 : 15
            });
            if (isCrit) playSound('crit'); else playSound('hit');
        }

        if (player.skills.darkburn>0 && skillKey!=='darkburn') {
            if (player.darkburnCd <= 0) {
                const lv=player.skills.darkburn;
                const damages = [0, 5, 7, 10, 15, 20];
                const finalBurnDmg = damages[lv] + (lv===5 ? 20 : 0); 
                e.burnEffect={
                    duration: [0,2,3,4,5,8][lv],
                    interval: [0,0.8,0.7,0.6,0.5,0.2][lv],
                    damage: finalBurnDmg,
                    timer:0, sparkPhase:0
                };
                player.darkburnCd = getDarkburnCd(); 
            }
        }

        if (player.skills.lifesteal>0 && player.hp<getMaxHP()) {
            const chance=[0,0.05,0.1,0.15,0.2,0.3][player.skills.lifesteal];
            if (Math.random()<chance) {
                player.hp=Math.min(getMaxHP(), player.hp+getMaxHP()*0.01);
                updateHPUI();
                if (!silent) {
                    textParticles.push({
                        x: player.x, y: player.y - 25, text: `+HP`, 
                        life: 0.5, maxLife: 0.5, vy: -50, vx: 0, 
                        isDmg: false, color: '#34a853', size: 14
                    });
                }
            }
        }

        if (e.hp<=0) {
            e.isDead=true;
            spawnShatterPieces(e); 
            
            if (e.isBoss) {
                stats.bossesKilled++;
                screenShake = 30;
                playSound('bossRoar');
                for (let k=0;k<40;k++) expOrbs.push({x:e.x,y:e.y,value:e.exp/40,life:20,vx:(Math.random()-0.5)*500,vy:(Math.random()-0.5)*500,targetS:null,ox:0,oy:0});
                triggerEvent("领主被击破！核心结构瓦解。", "normal", 0);
            } else {
                stats.kills++;
                expOrbs.push({x:e.x,y:e.y,value:e.exp,life:15,vx:(Math.random()-0.5)*150,vy:(Math.random()-0.5)*150,targetS:null,ox:0,oy:0});
                if (Math.random()<0.025) items.push({type:'singularity',x:e.x,y:e.y,life:20,rot:0});
            }
            
            for (let k=0;k<(e.isBoss?20:5);k++) particles.push({x:e.x,y:e.y,vx:(Math.random()-0.5)*(e.isBoss?400:220),vy:(Math.random()-0.5)*(e.isBoss?400:220),life:0.4,maxLife:0.4,size:2+Math.random()*4,color:THEME.main});
            score+=Math.floor(e.maxHp/10);
            addScoreEffect();
            playSound('kill');
        }
    }

    function damagePlayer(amount) {
        if (!gameRunning||player.invincibleTimer>0) return;
        player.hp-=amount*(1-(player.damageReduction||0));
        player.invincibleTimer=0.5; player.flashTimer=0.2; screenShake=12;
        updateHPUI(); playSound('playerHurt');
        
        comboCount = 0;
        document.getElementById('combo-display').classList.remove('active');

        if (player.hp<=0) { player.hp=0; endGame(); }
    }

    function spawnEnemyLogic(dt) {
        if (bossSystem.gathering || bossSystem.active) return; 

        const diffMult = 1 + gameTime / 240; 
        let baseInterval = Math.max(0.45, (2.8 - gameTime/180) / diffMult);
        let sm = 1;
        if (activeEvent==='horde') sm=2.2;
        else if (activeEvent==='horde_massive') sm=4;
        else if (activeEvent==='endgame') sm=7;

        spawnTimer+=dt;
        if (spawnTimer>=baseInterval/sm) {
            spawnTimer=0;
            const ang=Math.random()*Math.PI*2;
            const dts=Math.max(VIEW_W,VIEW_H)*0.8;
            const cx=player.x+Math.cos(ang)*dts, cy=player.y+Math.sin(ang)*dts;
            const cluster=Math.min(5, 1+Math.floor(gameTime/80)+Math.floor(Math.random()*2));
            let baseTier=3;
            if (gameTime>270||activeEvent==='endgame') baseTier=3+Math.floor(Math.random()*5);
            else if (gameTime>180||activeEvent==='elite') baseTier=3+Math.floor(Math.random()*4);
            else if (gameTime>90) baseTier=3+Math.floor(Math.random()*3);
            else if (gameTime>30) baseTier=3+Math.floor(Math.random()*2);

            for (let i=0;i<cluster;i++) {
                const sides=Math.min(7,Math.max(3,baseTier+(Math.random()>0.85?1:0)));
                const stats={
                    3:{r:16,hp:30,spd:170,exp:10,dmg:60},
                    4:{r:20,hp:75,spd:130,exp:20,dmg:90},
                    5:{r:24,hp:160,spd:95,exp:40,dmg:140},
                    6:{r:30,hp:320,spd:65,exp:80,dmg:200},
                    7:{r:38,hp:650,spd:48,exp:150,dmg:320}
                }[sides];
                const sm2=0.8+Math.random()*1.5;
                const timeMult = Math.pow(1.05, gameTime/60); 
                const atkMult = 1 + gameTime/300;
                let fHp=stats.hp*Math.pow(sm2,1.2)*timeMult;
                let fSpd=(stats.spd/Math.sqrt(sm2))*(0.9+Math.random()*0.2)*(1+gameTime/400);
                let fAtk=stats.dmg*atkMult;
                if (activeEvent==='speed_up'||activeEvent==='endgame') fSpd*=1.5;
                enemies.push({
                    id:enemyIdCounter++, x:cx+(Math.random()-0.5)*100, y:cy+(Math.random()-0.5)*100,
                    sides, radius:stats.r*sm2, sizeMult:sm2, speed:fSpd,
                    hp:fHp, maxHp:fHp, exp:stats.exp*sm2, atk:fAtk,
                    angle:Math.random()*Math.PI*2, spin:(Math.random()-0.5)*4,
                    hitTimer:0, hitByRing:new Set(), isDead:false, burnEffect:null, isBoss: false, overlapCount: 0
                });
            }
        }
    }

    function updateBossSystem(dt) {
        if (!bossSystem.active && !bossSystem.gathering && gameTime > 120) {
            if (Math.random() < (dt / 60)) {
                bossSystem.gathering = true;
                bossSystem.absorbedHp = 0;
                bossSystem.minTier = 99;
                bossSystem.maxTier = 0;
                let ang = Math.random() * Math.PI * 2;
                bossSystem.gatherPoint = {
                    x: player.x + Math.cos(ang) * 500,
                    y: player.y + Math.sin(ang) * 500
                };
                triggerEvent("警告：探测到极高浓度暗能反应！空间正在塌缩！", "elite", 10);
                playSound('bossRoar');
                screenShake = 20;
            }
        }

        if (bossSystem.gathering) {
            let allAbsorbed = true;
            for (let i = 0; i < enemies.length; i++) {
                let e = enemies[i];
                if (e.isDead || e.isBoss) continue;
                let dx = bossSystem.gatherPoint.x - e.x;
                let dy = bossSystem.gatherPoint.y - e.y;
                let distSq = dx*dx + dy*dy;
                if (distSq < 1600) {
                    bossSystem.absorbedHp += e.maxHp;
                    if (e.sides < bossSystem.minTier) bossSystem.minTier = e.sides;
                    if (e.sides > bossSystem.maxTier) bossSystem.maxTier = e.sides;
                    e.isDead = true; 
                } else {
                    allAbsorbed = false;
                    let dist = Math.sqrt(distSq);
                    e.x += (dx/dist) * e.speed * 2.5 * dt; 
                    e.y += (dy/dist) * e.speed * 2.5 * dt;
                }
            }
            
            ctx.save();
            ctx.translate(bossSystem.gatherPoint.x - getCamera().x, bossSystem.gatherPoint.y - getCamera().y);
            ctx.beginPath(); ctx.arc(0, 0, 100 + Math.sin(gameTime*10)*20, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(217, 56, 30, 0.3)'; ctx.fill();
            ctx.restore();

            if (allAbsorbed || enemies.length === 0) {
                bossSystem.gathering = false;
                bossSystem.active = true;
                if (bossSystem.minTier === 99) bossSystem.minTier = 3;
                if (bossSystem.maxTier === 0) bossSystem.maxTier = 5;
                
                let finalHp = 50000 + bossSystem.absorbedHp * 4 + gameTime * 150;
                let finalRad = Math.min(200, 50 + finalHp / 1500); 
                
                let boss = {
                    id: enemyIdCounter++,
                    x: bossSystem.gatherPoint.x, y: bossSystem.gatherPoint.y,
                    sides: 8, radius: finalRad, sizeMult: 5, speed: 70,
                    hp: finalHp, maxHp: finalHp, exp: finalHp * 0.1, atk: 400 + gameTime,
                    angle: 0, spin: 1, hitTimer: 0, hitByRing: new Set(), isDead: false,
                    isBoss: true, phase: 'idle', phaseTimer: 2, laserCount: 0,
                    morphPhase: 0 
                };
                enemies.push(boss);
                bossSystem.bossEntity = boss;
                triggerEvent("【深渊领主】已重组降临！", "boss", 0);
                playSound('bossRoar');
                screenShake = 25;
                
                let hpUI = document.getElementById('boss-ui');
                if(hpUI) { hpUI.classList.add('visible'); }
            }
        }

        if (bossSystem.active && bossSystem.bossEntity) {
            let b = bossSystem.bossEntity;
            if (b.isDead) {
                bossSystem.active = false;
                bossSystem.bossEntity = null;
                bossSystem.cooldown = 40 + Math.random() * 30; 
                let hpUI = document.getElementById('boss-ui');
                if(hpUI) { hpUI.classList.remove('visible'); }
                return;
            }
            
            b.phaseTimer -= dt;

            if (b.phase === 'idle' && b.phaseTimer <= 0) {
                b.phase = Math.random() > 0.5 ? 'warn_spawn' : 'warn_laser';
                b.phaseTimer = 1.5;
            } else if (b.phase === 'warn_spawn') {
                ctx.save(); ctx.translate(-getCamera().x, -getCamera().y);
                ctx.strokeStyle = 'rgba(217, 56, 30, 0.6)'; ctx.lineWidth = 3;
                ctx.setLineDash([10, 10]);
                ctx.beginPath(); ctx.arc(player.x, player.y, 200, 0, Math.PI*2); ctx.stroke();
                ctx.restore();
                
                if (b.phaseTimer <= 0) {
                    b.phase = 'idle'; b.phaseTimer = 3;
                    
                    let spawnCount = 4 + Math.floor(Math.random() * 4); 
                    let avgTier = (bossSystem.minTier + bossSystem.maxTier) / 2;
                    if (avgTier <= 4) spawnCount += Math.floor((5 - avgTier) * 4); 
                    
                    for(let i=0; i<spawnCount; i++) {
                        let ang = Math.random()*Math.PI*2;
                        let tx = player.x + Math.cos(ang)*200;
                        let ty = player.y + Math.sin(ang)*200;
                        let tier = bossSystem.minTier + Math.floor(Math.random()*(bossSystem.maxTier - bossSystem.minTier + 1));
                        tier = Math.max(3, tier); 
                        enemies.push({
                            id: enemyIdCounter++, x: tx, y: ty, sides: tier, radius: tier*4, sizeMult: 1, speed: 120,
                            hp: tier*50, maxHp: tier*50, exp: tier*10, atk: tier*30, angle: 0, spin: 2,
                            hitTimer: 0, hitByRing: new Set(), isDead: false, isBoss: false, overlapCount: 0
                        });
                        particles.push({x: tx, y: ty, type: 'pulse', life: 0.5, maxLife: 0.5, radius: 40});
                    }
                    playSound('bomb');
                }
            } else if (b.phase === 'warn_laser') {
                if (!b.targetAngle) b.targetAngle = Math.atan2(player.y - b.y, player.x - b.x);
                ctx.save(); ctx.translate(-getCamera().x, -getCamera().y);
                ctx.fillStyle = 'rgba(217, 56, 30, 0.15)';
                ctx.translate(b.x, b.y); ctx.rotate(b.targetAngle);
                ctx.fillRect(0, -40, 3000, 80);
                ctx.restore();
                
                if (b.phaseTimer <= 0) {
                    b.phase = 'fire_laser'; b.phaseTimer = 0.5;
                    lasers.push({
                        x: b.x, y: b.y, angle: b.targetAngle, life: 0.6, maxLife: 0.6, 
                        dmg: b.atk * 0.5, hitSet: new Set(), widthOffset: 1.5, bw: false, isEnemy: true
                    });
                    screenShake = 15; playSound('laser');
                }
            } else if (b.phase === 'fire_laser' && b.phaseTimer <= 0) {
                b.laserCount = (b.laserCount || 0) + 1;
                if (b.laserCount >= 3) {
                    b.laserCount = 0; b.phase = 'idle'; b.phaseTimer = 2.5; b.targetAngle = null;
                } else {
                    b.phase = 'warn_laser'; b.phaseTimer = 0.8; b.targetAngle = null;
                }
            }
        }
    }

    function checkActiveSkills(dt) {
        if (!player||!player.skills) return;

        if (player.darkburnCd > 0) player.darkburnCd -= dt;

        if (player.skills.darksurge>0) {
            if (player.darksurgeDuration>0 && player.darksurgeDuration !== Infinity) player.darksurgeDuration-=dt;
            else if (player.darksurgeDuration !== Infinity) {
                player.timers.darksurge-=dt;
                if (player.timers.darksurge<=0) {
                    let lv=player.skills.darksurge;
                    player.darksurgeDuration=[0,7,8,9,10,Infinity][lv];
                    let rawCd = [0,9,8,7,6,0][lv];
                    if(lv < 5) rawCd -= 3;
                    player.timers.darksurge = Math.max(1, rawCd * getCdMulti());
                    playSound('xp');
                }
            }
        }

        if (player.skills.isincos>0) {
            player.timers.isincos-=dt;
            if (player.timers.isincos<=0) {
                const lv=player.skills.isincos;
                player.timers.isincos=getSkillMaxCd('isincos');
                coreChargeActive=true; coreSkillCharge=0;
                
                let sorted = enemies.filter(e => !e.isDead && isInView(e.x,e.y,50))
                    .map(e => ({e, d: (e.x-player.x)**2+(e.y-player.y)**2}))
                    .sort((a,b) => a.d - b.d);
                    
                let laserCount = [0, 1, 1, 2, 2, 3][lv];
                for(let i=0; i < Math.min(laserCount, sorted.length); i++) {
                    let target = sorted[i].e;
                    lasers.push({
                        x:player.x, y:player.y,
                        angle:Math.atan2(target.y-player.y, target.x-player.x),
                        life:0.45, maxLife:0.45,
                        dmg:[0,150,300,600,1000,2500][lv]*getRangeMulti(),
                        hitSet:new Set(), widthOffset:getRangeMulti(),
                        bw:true, isEnemy: false
                    });
                }
                if(sorted.length > 0) { screenShake=18; playSound('laser'); }
                setTimeout(()=>{coreChargeActive=false;}, 450);
            }
        }

        if (player.skills.bomb>0) {
            player.timers.bomb-=dt;
            if (player.timers.bomb<=0) {
                const lv=player.skills.bomb;
                player.timers.bomb=getSkillMaxCd('bomb');
                const count=[0,1,2,2,3,3][lv];
                const dmg=[0,200,200,400,400,1000][lv];
                coreChargeActive=true;
                const sorted=enemies.filter(e=>!e.isDead&&isInView(e.x,e.y,200))
                    .map(e=>({e,d:(e.x-player.x)**2+(e.y-player.y)**2}))
                    .sort((a,b)=>a.d-b.d);
                for (let i=0;i<Math.min(count,sorted.length);i++) {
                    bombs.push({
                        startX:player.x, startY:player.y,
                        tX:sorted[i].e.x, tY:sorted[i].e.y,
                        life:1.0, maxLife:1.0,
                        text:`${Math.floor(Math.random()*8)+2}^${Math.floor(Math.random()*8)+2}`,
                        dmg, range:120*getRangeMulti()
                    });
                }
                if (sorted.length) playSound('bomb');
                setTimeout(()=>{coreChargeActive=false;},600);
            }
        }

        if (player.skills.downgrade>0) {
            player.timers.downgrade-=dt;
            if (player.timers.downgrade<=0) {
                player.timers.downgrade=getSkillMaxCd('downgrade');
                downgradeRings.push({x:player.x,y:player.y,radius:10,speed:600,life:5,id:Math.random()});
                playSound('downgrade');
                triggerEvent("释放: 降维打击 (R^n-1)", "normal", 0);
            }
        }

        if (player.skills.darkmine > 0) {
            player.timers.darkmine -= dt;
            if (player.timers.darkmine <= 0) {
                const lv = player.skills.darkmine;
                player.timers.darkmine = getSkillMaxCd('darkmine');
                darkmines.push({
                    x: player.x, y: player.y,
                    radius: 55 * getRangeMulti(),
                    dmg: [0, 150, 240, 350, 460, 600][lv] * getBulletDamageMulti(),
                    state: 'arming',
                    timer: 0.8,
                    life: 8.0, maxLife: 8.0
                });
            }
        }
    }

    function updateCoreAnimation(dt) {
        coreBreathPhase+=dt*2;
        if (coreShootPulse>0) {
            coreShootPulse-=dt*3.5;
            if (coreShootPulse<0) coreShootPulse=0;
        }
        if (coreChargeActive) {
            coreSkillCharge=Math.min(1, coreSkillCharge+dt*2);
        } else {
            coreSkillCharge=Math.max(0, coreSkillCharge-dt*2);
        }
    }

    function drawEnemyPoly(cx, cy, radius, sides, angle, alpha, isBoss, morphPhase) {
        if (isBoss) {
            ctx.beginPath();
            const points = 40; 
            for(let i=0; i<=points; i++) {
                let ang = (i/points) * Math.PI * 2 + angle;
                let wave = Math.sin(ang * 4 + morphPhase * 2) * 15 + Math.cos(ang * 7 - morphPhase) * 10;
                let r = radius + wave;
                if (i===0) ctx.moveTo(cx + Math.cos(ang)*r, cy + Math.sin(ang)*r);
                else ctx.lineTo(cx + Math.cos(ang)*r, cy + Math.sin(ang)*r);
            }
            ctx.closePath();
        } else {
            ctx.beginPath();
            for (let i=0;i<sides;i++) {
                const a=angle+(i*2*Math.PI)/sides;
                ctx.lineTo(cx+Math.cos(a)*radius, cy+Math.sin(a)*radius);
            }
            ctx.closePath();
        }
    }

    let lastTime=performance.now();

    function loop(now) {
        requestAnimationFrame(loop);
        try {
            let dt=(now-lastTime)/1000;
            if (isNaN(dt)||dt<0||dt>0.1) dt=0.016;
            lastTime=now;

            fpsFrames++;
            if (now - fpsLastTime >= 500) {
                currentFps = Math.round((fpsFrames * 1000) / (now - fpsLastTime));
                document.getElementById('fps-display').textContent = `FPS: ${currentFps}`;
                fpsFrames = 0; fpsLastTime = now;
            }

            if (isPaused) return;

            if (gameRunning && !isGameOver && player) {
                gameTime+=dt;
                document.getElementById('hud-time').textContent = formatTime(gameTime);

                if (comboTimer > 0) {
                    comboTimer -= dt;
                    if (comboTimer <= 0) {
                        comboCount = 0;
                        document.getElementById('combo-display').classList.remove('active');
                    }
                }
                
                const sec=Math.floor(gameTime);
                if (sec===60&&!eventsTriggered[60]) { eventsTriggered[60]=true; triggerEvent("警告：多边形群落进化接近！","horde",15); }
                if (sec===120&&!eventsTriggered[120]) { eventsTriggered[120]=true; triggerEvent("空间碎裂：高维晶体降临！","elite",20); }
                if (sec===180&&!eventsTriggered[180]) { eventsTriggered[180]=true; triggerEvent("能量潮汐：核心掉落翻倍！","double_xp",20); }
                if (sec===240&&!eventsTriggered[240]) { eventsTriggered[240]=true; triggerEvent("致命警告：超级几何体海！","horde_massive",20); }
                if (sec===300&&!eventsTriggered[300]) { eventsTriggered[300]=true; triggerEvent("系统崩溃：无尽深渊启动...","endgame",9999); }
                if (activeEvent) { eventTimer-=dt; if (eventTimer<=0) { activeEvent=null; triggerEvent("异常消除。","normal",0); } }

                updateCoreAnimation(dt);
                player.speed=getPlayerSpeed();
                player.shootDelay=getShootDelay();

                if (player.hp<getMaxHP()) {
                    const rAmt=[0,2,4,6,8,12][player.skills.regen||0];
                    if (rAmt>0) { player.hp=Math.min(getMaxHP(),player.hp+rAmt*dt); updateHPUI(); }
                }

                for (const sk of ['isincos','bomb','downgrade','darksurge','darkmine']) {
                    if (player.skills[sk]>0) {
                        const el=document.getElementById(`cd-${sk}`);
                        if (el) {
                            let pct= (sk==='darksurge' && player.darksurgeDuration === Infinity)
                                ? 1 : Math.max(0,1-(player.timers[sk]/getSkillMaxCd(sk)));
                            el.style.transform=`scaleY(${pct})`;
                        }
                    }
                }

                let mx=moveX, my=moveY;
                if (keys['w']||keys['ArrowUp']) my-=1;
                if (keys['s']||keys['ArrowDown']) my+=1;
                if (keys['a']||keys['ArrowLeft']) mx-=1;
                if (keys['d']||keys['ArrowRight']) mx+=1;
                const mag=Math.sqrt(mx*mx+my*my);
                if (mag>1) { mx/=mag; my/=mag; }
                player.x=Math.max(player.radius,Math.min(WORLD_W-player.radius,player.x+mx*player.speed*dt));
                player.y=Math.max(player.radius,Math.min(WORLD_H-player.radius,player.y+my*player.speed*dt));

                let nearestDist=Infinity, nearestEnemy=null;
                for (const e of enemies) {
                    if (e.isDead) continue; 
                    const dSq=(e.x-player.x)**2+(e.y-player.y)**2;
                    if (dSq<nearestDist) { nearestDist=dSq; nearestEnemy=e; }
                }

                let targetAngle=player.aimAngle;
                if (nearestEnemy&&Math.sqrt(nearestDist)<600) targetAngle=Math.atan2(nearestEnemy.y-player.y,nearestEnemy.x-player.x);
                else if (mx!==0||my!==0) targetAngle=Math.atan2(my,mx);
                let diff=targetAngle-player.aimAngle;
                while(diff>Math.PI) diff-=Math.PI*2;
                while(diff<-Math.PI) diff+=Math.PI*2;
                player.aimAngle+=diff*12*dt;

                if (mag>0.1&&Math.random()<0.25) trails.push({x:player.x,y:player.y,alpha:0.28});
                if (player.invincibleTimer>0) player.invincibleTimer-=dt;
                if (player.flashTimer>0) player.flashTimer-=dt;
                
                if (player.shootCooldown>0) player.shootCooldown-=dt;
                if (player.shootCooldown<=0) { 
                    fireBasicShoot(); 
                    player.shootCooldown=player.shootDelay; 
                }
                let newQueue = [];
                for(let i=0; i<burstQueue.length; i++) {
                    burstQueue[i] -= dt;
                    if(burstQueue[i] <= 0) executeFire(true);
                    else newQueue.push(burstQueue[i]);
                }
                burstQueue = newQueue;

                checkActiveSkills(dt);
                spawnEnemyLogic(dt);
                updateBossSystem(dt);

                for (const e of enemies) {
                    if (e.isDead||!e.burnEffect) continue;
                    e.burnEffect.duration-=dt; e.burnEffect.timer+=dt;
                    e.burnEffect.sparkPhase=(e.burnEffect.sparkPhase||0)+dt*8;
                    if (e.burnEffect.timer>=e.burnEffect.interval) {
                        e.burnEffect.timer=0; damageEnemy(e, e.burnEffect.damage, false, 'darkburn', false);
                    }
                    if (e.burnEffect.duration<=0) e.burnEffect=null;
                }

                const newItems=[];
                for (const it of items) {
                    it.life-=dt; it.rot+=3*dt;
                    const d=Math.sqrt((player.x-it.x)**2+(player.y-it.y)**2);
                    if (d<player.radius+20) {
                        activeSingularities.push({x:it.x,y:it.y,life:4,maxLife:4,angle:0});
                        triggerEvent("触发奇点：经验引力场！","normal",0); playSound('laser');
                    } else if (it.life>0) newItems.push(it);
                }
                items=newItems;

                const newSings=[];
                for (const s of activeSingularities) {
                    s.life-=dt; s.angle+=dt*2;
                    if (s.life>0) {
                        newSings.push(s);
                        for (const o of expOrbs) {
                            if (!o.targetS) {
                                o.targetS=s; o.orbitAngle=Math.random()*Math.PI*2; o.orbitRadius=30+Math.random()*50;
                            }
                        }
                    }
                }
                activeSingularities=newSings;

                const newRings=[];
                for (const ring of downgradeRings) {
                    ring.radius+=ring.speed*dt; ring.life-=dt;
                    for (const e of enemies) {
                        if (e.isDead||e.hitByRing.has(ring.id) || e.isBoss) continue;
                        const dtr=Math.abs(Math.sqrt((e.x-ring.x)**2+(e.y-ring.y)**2)-ring.radius);
                        if (dtr<30) {
                            e.hitByRing.add(ring.id);
                            if (e.sides>3) {
                                const dc=player.skills.downgrade; const oldS=e.sides;
                                e.sides=Math.max(3,e.sides-dc); const drop=oldS-e.sides;
                                if (drop>0) {
                                    e.radius*=Math.pow(0.8,drop); e.speed*=Math.pow(1.25,drop);
                                    const oldMax=e.maxHp; e.maxHp*=Math.pow(0.6,drop); e.hp*=e.maxHp/oldMax;
                                    textParticles.push({
                                        x:e.x, y:e.y, text:`DIM-${drop}`, life:0.8, maxLife:0.8, vy:-40, vx:0, 
                                        isDmg:false, color:'#4285f4', size:16
                                    });
                                }
                            }
                        }
                    }
                    if (ring.life>0) newRings.push(ring);
                }
                downgradeRings=newRings;

                const newMines=[];
                for (const m of darkmines) {
                    if (m.state === 'arming') {
                        m.timer -= dt;
                        if (m.timer <= 0) m.state = 'idle';
                        newMines.push(m);
                    } else if (m.state === 'idle') {
                        m.life -= dt;
                        if (m.life > 0) {
                            let triggered = false;
                            for (const e of enemies) {
                                if (e.isDead) continue;
                                const dSq = (e.x - m.x)**2 + (e.y - m.y)**2;
                                if (dSq < (m.radius + e.radius)**2) { triggered = true; break; }
                            }
                            if (triggered) {
                                m.state = 'explode'; m.timer = 0.4;
                                for (const e2 of enemies) {
                                    if (e2.isDead) continue;
                                    if ((e2.x - m.x)**2 + (e2.y - m.y)**2 < (m.radius * 1.6 + e2.radius)**2) {
                                        damageEnemy(e2, m.dmg, true, 'darkmine');
                                    }
                                }
                                playSound('bomb');
                                screenShake = Math.max(screenShake, 15);
                            }
                            newMines.push(m);
                        }
                    } else if (m.state === 'explode') {
                        m.timer -= dt;
                        if (m.timer > 0) newMines.push(m);
                    }
                }
                darkmines=newMines;

                const newBombs=[];
                for (const b of bombs) {
                    b.life-=dt;
                    if (b.life<=0) {
                        particles.push({x:b.tX,y:b.tY,type:'blast',radius:b.range,life:0.5,maxLife:0.5});
                        floorTexts.push({x:b.tX,y:b.tY,text:b.text,life:2.0,maxLife:2.0});
                        for (const e of enemies) {
                            if (!e.isDead&&(e.x-b.tX)**2+(e.y-b.tY)**2<b.range*b.range) damageEnemy(e,b.dmg,true,'bomb');
                        }
                    } else newBombs.push(b);
                }
                bombs=newBombs;
                floorTexts=floorTexts.filter(f=>{f.life-=dt;return f.life>0;});

                for (let i=0; i<enemies.length; i++) {
                    const e = enemies[i];
                    if (e.isDead) continue;
                    
                    let targetX = player.x;
                    let targetY = player.y;
                    
                    let sepX = 0, sepY = 0;
                    e.overlapCount = 0;
                    for (let j=0; j<enemies.length; j++) {
                        if(i===j) continue;
                        let e2 = enemies[j];
                        if (e2.isDead) continue;
                        let dx2 = e.x - e2.x, dy2 = e.y - e2.y;
                        let distSq = dx2*dx2 + dy2*dy2;
                        let minDist = e.radius + e2.radius + 15;
                        if (distSq < minDist*minDist && distSq > 0.1) {
                            let dist = Math.sqrt(distSq);
                            sepX += (dx2/dist) * (minDist - dist);
                            sepY += (dy2/dist) * (minDist - dist);
                            e.overlapCount++;
                        }
                    }

                    if (!bossSystem.gathering) {
                        const dx=targetX-e.x, dy=targetY-e.y, d=Math.sqrt(dx*dx+dy*dy);
                        if (d>0) { 
                            e.x += (dx/d)*e.speed*dt + sepX*dt*3; 
                            e.y += (dy/d)*e.speed*dt + sepY*dt*3; 
                        }
                    }
                    
                    e.angle+=e.spin*dt;
                    if (e.hitTimer>0) e.hitTimer-=dt;
                    if (e.isBoss) e.morphPhase = (e.morphPhase||0) + dt;
                    
                    const pd = Math.sqrt((player.x-e.x)**2 + (player.y-e.y)**2);
                    if (player.invincibleTimer<=0 && pd<player.radius+e.radius) damagePlayer(e.atk);
                }

                const newBullets=[];
                for (const b of bullets) {
                    if (Math.random()<0.6) bulletTrails.push({x:b.x,y:b.y,life:0.12,maxLife:0.12,r:b.radius*0.8,isDark:b.isDark});
                    b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
                    if (b.life<=0||b.x<0||b.x>WORLD_W||b.y<0||b.y>WORLD_H) continue;
                    let remove=false;
                    for (const e of enemies) {
                        if (e.isDead) continue;
                        if ((b.x-e.x)**2+(b.y-e.y)**2<(b.radius+e.radius)**2) {
                            if (b.hitSet.has(e.id)) continue;
                            damageEnemy(e, b.dmg, false, b.type);
                            if (b.isDark) processDarkChain(e, b.dmg);
                            if (!b.isSplit) triggerSplit(b.x, b.y);
                            if ((b.penetration||0)>0) { b.penetration--; b.hitSet.add(e.id); }
                            else { remove=true; break; }
                        }
                    }
                    if (!remove) newBullets.push(b);
                }
                bullets=newBullets;
                bulletTrails=bulletTrails.filter(t=>{t.life-=dt;return t.life>0;});

                const newLasers=[];
                for (const l of lasers) {
                    l.life-=dt;
                    const ldx=Math.cos(l.angle), ldy=Math.sin(l.angle);
                    const cw=Math.pow(Math.max(0.01,Math.sin((l.life/l.maxLife)*Math.PI)),0.5)*120*l.widthOffset;
                    if(l.isEnemy) {
                        const vX=player.x-l.x, vY=player.y-l.y, proj=vX*ldx+vY*ldy;
                        if (proj>0&&Math.abs(vX*ldy-vY*ldx)<cw/2+player.radius && !l.hitSet.has(99999)) {
                            damagePlayer(l.dmg); l.hitSet.add(99999);
                        }
                    } else {
                        for (const e of enemies) {
                            if (e.isDead) continue;
                            const vX=e.x-l.x, vY=e.y-l.y, proj=vX*ldx+vY*ldy;
                            if (proj>0&&Math.abs(vX*ldy-vY*ldx)<cw/2+e.radius&&!l.hitSet.has(e.id)) {
                                damageEnemy(e, l.dmg, true, 'isincos'); l.hitSet.add(e.id);
                            }
                        }
                    }
                    if (l.life>0) newLasers.push(l);
                }
                lasers=newLasers;

                const newOrbs=[];
                for (const orb of expOrbs) {
                    orb.x+=orb.vx*dt; orb.y+=orb.vy*dt;
                    orb.vx*=0.85; orb.vy*=0.85;
                    if (orb.targetS&&orb.targetS.life>0) {
                        orb.orbitAngle=(orb.orbitAngle||0)+dt*3;
                        const tx=orb.targetS.x+Math.cos(orb.orbitAngle)*(orb.orbitRadius||40);
                        const ty=orb.targetS.y+Math.sin(orb.orbitAngle)*(orb.orbitRadius||40);
                        const dx=tx-orb.x, dy=ty-orb.y, dSq=dx*dx+dy*dy;
                        if (dSq>16) { const d=Math.sqrt(dSq); orb.x+=(dx/d)*1200*dt; orb.y+=(dy/d)*1200*dt; }
                    } else {
                        orb.targetS=null;
                        const dx=player.x-orb.x, dy=player.y-orb.y, dSq=dx*dx+dy*dy;
                        if (dSq<(player.radius+8)**2) { gainXP(orb.value); orb.collected=true; }
                        else if (dSq<getPickupRange()**2) { const d=Math.sqrt(dSq); orb.x+=(dx/d)*600*dt; orb.y+=(dy/d)*600*dt; }
                    }
                    orb.life-=dt;
                    if (!orb.collected&&orb.life>0) newOrbs.push(orb);
                }
                expOrbs=newOrbs;
                enemies=enemies.filter(e=>!e.isDead);
            }

            trails=trails.filter(t=>{t.alpha-=dt*1.5;return t.alpha>0;});
            particles=particles.filter(p=>{p.x+=(p.vx||0)*dt;p.y+=(p.vy||0)*dt;p.life-=dt;return p.life>0;});
            
            const newPieces = [];
            for(const p of shatterPieces) {
                p.x += p.vx * dt; p.y += p.vy * dt;
                p.rot += p.spin * dt; p.life -= dt;
                if(p.life > 0) newPieces.push(p);
            }
            shatterPieces = newPieces;

            // 飘字动画核心 (支持抛物线和正弦波摇摆)
            textParticles=textParticles.filter(tp=>{
                if (tp.isDmg) {
                    tp.x = tp.baseX + Math.sin(gameTime * tp.wobbleSpeed + tp.wobbleOffset) * 12;
                    tp.y += tp.vy * dt;
                    tp.vy += 150 * dt; // 重力
                } else {
                    tp.x += (tp.vx || 0) * dt; 
                    tp.y += (tp.vy || 0) * dt; 
                    tp.vy += 150 * dt; 
                }
                tp.life -= dt; return tp.life > 0;
            });

            chainEffects=chainEffects.filter(c=>{c.life-=dt;return c.life>0;});
            if (screenShake>0) { screenShake-=dt*55; if(screenShake<0) screenShake=0; }

            // ==========================================
            // 渲染
            // ==========================================
            ctx.clearRect(0,0,VIEW_W,VIEW_H);
            ctx.fillStyle=THEME.bg; ctx.fillRect(0,0,VIEW_W,VIEW_H);

            const cam=getCamera();
            ctx.save();
            if (screenShake>0) ctx.translate((Math.random()-0.5)*screenShake,(Math.random()-0.5)*screenShake);
            ctx.translate(-cam.x,-cam.y);

            ctx.strokeStyle=THEME.grid; ctx.lineWidth=1;
            for (let x=Math.floor(cam.x/100)*100;x<cam.x+VIEW_W;x+=100) { ctx.beginPath(); ctx.moveTo(x,cam.y); ctx.lineTo(x,cam.y+VIEW_H); ctx.stroke(); }
            for (let y=Math.floor(cam.y/100)*100;y<cam.y+VIEW_H;y+=100) { ctx.beginPath(); ctx.moveTo(cam.x,y); ctx.lineTo(cam.x+VIEW_W,y); ctx.stroke(); }

            for (const f of floorTexts) {
                const a=f.life/f.maxLife;
                ctx.globalAlpha=a*0.5; ctx.fillStyle=THEME.main;
                ctx.font='bold 44px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
                ctx.save(); ctx.translate(f.x,f.y); ctx.scale(1,0.45); ctx.fillText(f.text,0,0); ctx.restore();
                ctx.globalAlpha=1;
            }

            for (const r of downgradeRings) {
                const a=r.life/5;
                ctx.globalAlpha=a*0.9; ctx.strokeStyle='#4285f4'; ctx.lineWidth=5;
                ctx.beginPath(); ctx.arc(r.x,r.y,r.radius,0,Math.PI*2); ctx.stroke();
                ctx.lineWidth=2; ctx.strokeStyle='rgba(100,180,255,0.7)';
                ctx.beginPath(); ctx.arc(r.x,r.y,r.radius+4,0,Math.PI*2); ctx.stroke();
                ctx.globalAlpha=1;
            }

            for (const m of darkmines) {
                ctx.save(); ctx.translate(m.x, m.y);
                if (m.state === 'arming') {
                    const a = 1 - (m.timer / 0.8);
                    ctx.globalAlpha = a; ctx.strokeStyle = THEME.darkPurple; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(0, 0, m.radius * a, 0, Math.PI*2); ctx.stroke();
                } else if (m.state === 'idle') {
                    const a = m.life / m.maxLife;
                    ctx.globalAlpha = a * 0.4; ctx.fillStyle = THEME.darkPurple;
                    ctx.beginPath(); ctx.arc(0, 0, m.radius, 0, Math.PI*2); ctx.fill();
                    ctx.rotate(gameTime * 2);
                    ctx.strokeStyle = THEME.darkPurple; ctx.lineWidth = 2; ctx.setLineDash([10, 15]);
                    ctx.beginPath(); ctx.arc(0, 0, m.radius, 0, Math.PI*2); ctx.stroke();
                } else if (m.state === 'explode') {
                    const a = m.timer / 0.4; ctx.globalAlpha = a;
                    const r = m.radius * 1.6 * (1.5 - 0.5 * a);
                    ctx.fillStyle = THEME.darkPurple; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#ff4500'; ctx.beginPath(); ctx.arc(0, 0, r * 0.7, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore(); ctx.globalAlpha = 1;
            }

            for (const t of trails) {
                ctx.globalAlpha=t.alpha; ctx.strokeStyle=THEME.main; ctx.lineWidth=1.5;
                ctx.beginPath(); ctx.arc(t.x,t.y,player?player.radius-2:12,0,Math.PI*2); ctx.stroke();
            }
            ctx.globalAlpha=1;

            for (const s of activeSingularities) {
                const a=s.life/s.maxLife; const r=40+Math.sin(gameTime*5)*8;
                ctx.globalAlpha=a*0.5; ctx.strokeStyle='rgba(100,0,200,0.8)'; ctx.lineWidth=2;
                ctx.beginPath(); ctx.arc(s.x,s.y,r,0,Math.PI*2); ctx.stroke();
                ctx.strokeStyle='rgba(180,100,255,0.4)'; ctx.lineWidth=1;
                ctx.beginPath(); ctx.arc(s.x,s.y,r*0.6,0,Math.PI*2); ctx.stroke();
                ctx.globalAlpha=1;
            }

            for (const it of items) {
                ctx.save(); ctx.translate(it.x,it.y); ctx.rotate(it.rot);
                ctx.strokeStyle='rgba(100,0,200,0.9)'; ctx.lineWidth=2.5;
                ctx.beginPath();
                for (let j=0;j<4;j++) {
                    const ang=(j/4)*Math.PI*2; const r=14+Math.sin(gameTime*4+j)*2;
                    ctx.lineTo(Math.cos(ang)*r, Math.sin(ang)*r);
                }
                ctx.closePath(); ctx.stroke();
                ctx.fillStyle='rgba(80,0,160,0.25)'; ctx.fill(); ctx.restore();
            }

            for (const orb of expOrbs) {
                ctx.globalAlpha=0.3; ctx.fillStyle=THEME.xp;
                ctx.beginPath(); ctx.arc(orb.x-(orb.vx||0)*0.02, orb.y-(orb.vy||0)*0.02, 4, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha=1;
            }

            for (const orb of expOrbs) {
                ctx.fillStyle=THEME.xp;
                ctx.beginPath(); ctx.arc(orb.x,orb.y,6,0,Math.PI*2); ctx.fill();
                ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1.5; ctx.stroke();
            }

            for (const p of shatterPieces) {
                const a = p.life / p.maxLife;
                ctx.globalAlpha = a; ctx.fillStyle = p.color;
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
                const scale = 0.3 + 0.7 * a; ctx.scale(scale, scale);
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(p.p1x, p.p1y); ctx.lineTo(p.p2x, p.p2y); ctx.closePath();
                ctx.fill(); ctx.restore();
            }
            ctx.globalAlpha = 1;

            for (let i=0;i<enemies.length;i++) {
                const e=enemies[i];
                if (!isInView(e.x,e.y,250)) continue;
                
                const baseAlpha=Math.max(0.35, 1-(e.overlapCount||0)*0.18);
                ctx.globalAlpha=baseAlpha;

                if (e.isBoss) {
                    ctx.fillStyle = e.hitTimer > 0 ? 'rgba(255,50,50,0.9)' : 'rgba(30,10,30,0.9)';
                    ctx.strokeStyle = 'rgba(217,56,30,0.8)'; ctx.lineWidth = 4;
                    drawEnemyPoly(e.x, e.y, e.radius, e.sides, e.angle, baseAlpha, true, e.morphPhase);
                    ctx.fill(); ctx.stroke();
                } else if (e.hitTimer>0) {
                    ctx.fillStyle='rgba(220,50,30,0.85)';
                    drawEnemyPoly(e.x,e.y,e.radius,e.sides,e.angle,baseAlpha, false, 0); ctx.fill();
                } else {
                    ctx.fillStyle=THEME.main;
                    drawEnemyPoly(e.x,e.y,e.radius,e.sides,e.angle,baseAlpha, false, 0); ctx.fill();
                }
                ctx.globalAlpha=1;

                if (e.burnEffect) {
                    const phase=e.burnEffect.sparkPhase||0;
                    for (let k=0;k<8;k++) {
                        const sparkAngle=(k/8)*Math.PI*2+phase;
                        const r=e.radius*(0.9+Math.sin(phase*2+k)*0.2);
                        const sx2=e.x+Math.cos(sparkAngle)*r; const sy2=e.y+Math.sin(sparkAngle)*r;
                        const flicker=0.5+Math.sin(phase*5+k*1.3)*0.4;
                        ctx.globalAlpha=flicker*0.85; ctx.fillStyle='rgba(180,0,255,0.75)';
                        ctx.beginPath(); ctx.arc(sx2,sy2,4+Math.sin(phase*4+k)*2,0,Math.PI*2); ctx.fill();
                        ctx.fillStyle='rgba(80,0,160,0.4)';
                        ctx.beginPath(); ctx.arc(sx2,sy2,7+Math.sin(phase*4+k)*2,0,Math.PI*2); ctx.fill();
                    }
                    ctx.globalAlpha=0.35+Math.sin(phase*3)*0.15;
                    ctx.strokeStyle='rgba(150,0,255,0.9)'; ctx.lineWidth=3;
                    ctx.beginPath(); ctx.arc(e.x,e.y,e.radius+3+Math.sin(phase*6)*2,0,Math.PI*2); ctx.stroke();
                    ctx.globalAlpha=1;
                }

                if (!e.isBoss && e.hp<e.maxHp && e.hp>0) {
                    const bw=e.radius*2;
                    ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(e.x-bw/2,e.y-e.radius-9,bw,3);
                    ctx.fillStyle='#d9381e'; ctx.fillRect(e.x-bw/2,e.y-e.radius-9,bw*(e.hp/e.maxHp),3);
                }
            }

            for (const l of lasers) {
                const a=l.life/l.maxLife;
                const cw=Math.pow(Math.max(0.01,Math.sin(a*Math.PI)),0.4)*100*l.widthOffset;
                ctx.save(); ctx.translate(l.x,l.y); ctx.rotate(l.angle);
                if (l.bw) {
                    ctx.globalAlpha=a*0.15; ctx.fillStyle='rgba(255,255,255,0.9)';
                    ctx.beginPath(); ctx.ellipse(1000,0,1000,cw*1.5,0,0,Math.PI*2); ctx.fill();
                    ctx.globalAlpha=a*0.85; ctx.fillStyle='rgba(10,10,10,0.95)';
                    ctx.beginPath(); ctx.moveTo(0,-cw/2); ctx.lineTo(3000,-cw/8); ctx.lineTo(3000,cw/8); ctx.lineTo(0,cw/2); ctx.closePath(); ctx.fill();
                    ctx.globalAlpha=a; ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=2;
                    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(3000,0); ctx.stroke();
                } else {
                    ctx.globalAlpha=a*0.6;
                    const gradient=ctx.createLinearGradient(0,0,2000,0);
                    gradient.addColorStop(0, THEME.main); gradient.addColorStop(0.3, '#d9381e'); gradient.addColorStop(1, 'rgba(217,56,30,0)');
                    ctx.strokeStyle=gradient; ctx.lineWidth=cw; ctx.lineCap='round';
                    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(2000,0); ctx.stroke();
                }
                ctx.restore(); ctx.globalAlpha=1;
            }

            for (const b of bombs) {
                const t=1-(b.life/b.maxLife);
                const bx=b.startX+(b.tX-b.startX)*t;
                const by=b.startY+(b.tY-b.startY)*t-Math.sin(t*Math.PI)*110;
                ctx.fillStyle=THEME.main; ctx.font='bold 15px monospace';
                ctx.textAlign='center'; ctx.textBaseline='middle';
                ctx.fillText(b.text,bx,by);
                ctx.globalAlpha=0.08; ctx.fillStyle='rgba(0,0,0,1)';
                ctx.beginPath(); ctx.ellipse(bx,b.tY,Math.max(0.1,18*(1-t)),Math.max(0.1,6*(1-t)),0,0,Math.PI*2); ctx.fill();
                ctx.globalAlpha=1;
            }

            for (const bt of bulletTrails) {
                const a=bt.life/bt.maxLife; ctx.globalAlpha=a*0.45;
                ctx.fillStyle=bt.isDark?'rgba(120,0,200,0.8)':THEME.main;
                ctx.beginPath(); ctx.arc(bt.x,bt.y,bt.r*a,0,Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha=1;

            for (const b of bullets) {
                if (b.isDark) {
                    const fc=4;
                    for (let f=0;f<fc;f++) {
                        const fang=(gameTime*7+f*(Math.PI*2/fc))%(Math.PI*2);
                        const fr=b.radius+5;
                        ctx.globalAlpha=0.55; ctx.fillStyle='rgba(120,0,200,0.8)';
                        ctx.beginPath(); ctx.arc(b.x+Math.cos(fang)*fr,b.y+Math.sin(fang)*fr,3,0,Math.PI*2); ctx.fill();
                    }
                    ctx.globalAlpha=1; ctx.fillStyle='rgba(80,0,160,0.9)';
                } else { ctx.fillStyle=THEME.main; }
                ctx.beginPath(); ctx.arc(b.x,b.y,b.radius,0,Math.PI*2); ctx.fill();
                if (b.isDark) { ctx.strokeStyle='rgba(180,100,255,0.7)'; ctx.lineWidth=1.5; ctx.stroke(); }
            }

            for (const c of chainEffects) {
                const a=c.life/c.maxLife;
                ctx.globalAlpha=a*0.85; ctx.strokeStyle='rgba(100,0,220,0.95)'; ctx.lineWidth=3.5;
                ctx.beginPath(); ctx.moveTo(c.path[0].x,c.path[0].y);
                for (let j=1;j<c.path.length;j++) ctx.lineTo(c.path[j].x,c.path[j].y);
                ctx.stroke();
                ctx.globalAlpha=a*0.95; ctx.strokeStyle='rgba(220,180,255,1)'; ctx.lineWidth=1.5;
                ctx.beginPath(); ctx.moveTo(c.path[0].x,c.path[0].y);
                for (let j=1;j<c.path.length;j++) ctx.lineTo(c.path[j].x,c.path[j].y);
                ctx.stroke();
                ctx.globalAlpha=1;
            }

            for (const p of particles) {
                const a=p.life/(p.maxLife||1); ctx.globalAlpha=a;
                if (p.type==='pulse') {
                    ctx.strokeStyle=THEME.main; ctx.lineWidth=6*a;
                    ctx.beginPath(); ctx.arc(p.x,p.y,p.radius*(1-a),0,Math.PI*2); ctx.stroke();
                } else if (p.type==='blast') {
                    ctx.fillStyle='rgba(217,56,30,0.4)';
                    ctx.beginPath(); ctx.arc(p.x,p.y,p.radius,0,Math.PI*2); ctx.fill();
                    ctx.fillStyle='rgba(217,56,30,0.6)';
                    ctx.beginPath(); ctx.arc(p.x,p.y,p.radius*0.6,0,Math.PI*2); ctx.fill();
                } else {
                    ctx.fillStyle=p.color||THEME.main;
                    ctx.beginPath(); ctx.arc(p.x,p.y,p.size||3,0,Math.PI*2); ctx.fill();
                }
            }
            ctx.globalAlpha=1;

            if (player && !isGameOver) {
                const px=player.x, py=player.y, pr=player.radius;
                const isFlash=player.flashTimer>0&&Math.floor(gameTime*25)%2===0;

                if (player.darksurgeDuration>0 && player.darksurgeDuration !== Infinity) {
                    const fc=10;
                    for (let f=0;f<fc;f++) {
                        const fang=(gameTime*4+f*(Math.PI*2/fc))%(Math.PI*2);
                        const fr=pr+14+Math.sin(gameTime*8+f)*4;
                        ctx.globalAlpha=0.65;
                        ctx.fillStyle='rgba(150,0,255,0.7)';
                        ctx.beginPath(); ctx.arc(px+Math.cos(fang)*fr,py+Math.sin(fang)*fr,7,0,Math.PI*2); ctx.fill();
                    }
                    ctx.globalAlpha=1;
                } else if (player.darksurgeDuration === Infinity) {
                    const fc=12;
                    for (let f=0;f<fc;f++) {
                        const fang=(gameTime*5+f*(Math.PI*2/fc))%(Math.PI*2);
                        const fr=pr+16+Math.sin(gameTime*10+f)*5;
                        ctx.globalAlpha=0.8;
                        ctx.fillStyle='rgba(180,0,255,0.85)';
                        ctx.beginPath(); ctx.arc(px+Math.cos(fang)*fr,py+Math.sin(fang)*fr,9,0,Math.PI*2); ctx.fill();
                    }
                    ctx.globalAlpha=1;
                }

                ctx.strokeStyle=isFlash?THEME.damage:(player.darksurgeDuration>0?'rgba(120,0,220,0.9)':THEME.main);
                ctx.lineWidth=2.5;
                ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2); ctx.stroke();

                ctx.lineWidth=1.5; ctx.globalAlpha=0.5;
                ctx.beginPath(); ctx.arc(px,py,pr*0.65,0,Math.PI*2); ctx.stroke();
                ctx.globalAlpha=1;

                ctx.save(); ctx.translate(px,py); ctx.rotate(gameTime*0.6);
                let coreSize;
                if (coreSkillCharge>0.1) coreSize=pr*0.38*(1+coreSkillCharge*0.7);
                else if (coreShootPulse>0) coreSize=pr*0.38*(1+coreShootPulse*0.6);
                else coreSize=pr*0.38*(0.88+Math.sin(coreBreathPhase)*0.1);
                coreSize=Math.min(coreSize, pr*0.72);
                
                const cColor=player.darksurgeDuration>0?'rgba(120,0,220,0.85)':THEME.damage;
                ctx.strokeStyle=cColor; ctx.lineWidth=2;
                ctx.fillStyle=player.darksurgeDuration>0?'rgba(80,0,160,0.5)':'rgba(217,56,30,0.35)';
                ctx.beginPath(); ctx.moveTo(0,-coreSize); ctx.lineTo(coreSize*0.58,0); ctx.lineTo(0,coreSize); ctx.lineTo(-coreSize*0.58,0); ctx.closePath();
                ctx.fill(); ctx.stroke();
                ctx.fillStyle='rgba(255,255,255,0.7)';
                ctx.beginPath(); ctx.arc(0,0,coreSize*0.22,0,Math.PI*2); ctx.fill();
                ctx.restore();

                ctx.save(); ctx.translate(px,py); ctx.rotate(player.aimAngle||0);
                ctx.fillStyle=THEME.main;
                ctx.beginPath(); ctx.moveTo(pr+14,0); ctx.lineTo(pr+5,-5); ctx.lineTo(pr+5,5); ctx.closePath(); ctx.fill();
                ctx.restore();
            }

            // 渲染泰拉瑞亚飘字 (动态色相滑动)
            for (const tp of textParticles) {
                const a = tp.life / (tp.maxLife || 0.8);
                ctx.globalAlpha = Math.max(0, a); 
                if (tp.isDmg) {
                    const curHue = tp.hueEnd + (tp.hueStart - tp.hueEnd) * a;
                    ctx.fillStyle = `hsl(${curHue}, 100%, ${tp.size > 16 ? 60 : 55}%)`;
                } else {
                    ctx.fillStyle = tp.color;
                }
                ctx.font = `bold ${tp.size}px sans-serif`; 
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                
                ctx.lineWidth = 2.5; ctx.strokeStyle = 'rgba(0,0,0,0.6)';
                ctx.strokeText(tp.text, tp.x, tp.y);
                ctx.fillText(tp.text, tp.x, tp.y);
            }
            ctx.globalAlpha = 1;

            ctx.restore();

        } catch(err) { console.error("Engine Error:",err); }
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
